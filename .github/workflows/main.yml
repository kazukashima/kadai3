name: Scheduled deploy

on:
  schedule:
    - cron: "0 6 * * *" # 毎日 15:00 JST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v2
        with:
          node-version: "18"

      - run: npm install
      - run: npm run build

      # dist フォルダをアップロード
      - name: Upload production-ready dist
        uses: actions/upload-artifact@v3
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v2
        with:
          node-version: "18"

      # build ジョブから dist を持ってくる
      - name: Download dist
        uses: actions/download-artifact@v3
        with:
          name: dist
          path: dist

      - run: npm install --save-dev firebase-tools

      - name: Decode Firebase service account key
        run: |
          echo "${{ secrets.FIREBASE_KEY }}" | base64 -d > ./firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-key.json" >> $GITHUB_ENV

      - name: Deploy to Firebase Hosting
        run: ./node_modules/.bin/firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-key.json

      - name: Delete GOOGLE_APPLICATION_CREDENTIALS
        run: |
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS" ]; then
            rm "$GOOGLE_APPLICATION_CREDENTIALS"
          fi
